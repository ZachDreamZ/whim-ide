name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    runs-on: windows-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: npm test

  rust-check:
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-toolchain@v1
        with:
          toolchain: stable
          profile: minimal
      - run: cargo check --manifest-path src-tauri/Cargo.toml

  rust-clippy:
    runs-on: windows-latest
    needs: rust-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          components: clippy
      - run: cargo clippy --all-targets --all-features --manifest-path src-tauri/Cargo.toml -- -D warnings

  rust-test:
    runs-on: windows-latest
    needs: rust-clippy
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-toolchain@v1
        with:
          toolchain: stable
          profile: minimal
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  build:
    runs-on: windows-latest
    needs: [test, rust-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: npm run build
