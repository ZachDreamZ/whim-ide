name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    runs-on: windows-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: npm test

  rust-check:
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          profile: minimal
      - run: cargo check --manifest-path src-tauri/Cargo.toml

  rust-clippy:
    runs-on: windows-latest
    needs: rust-check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          profile: minimal
          components: clippy
      - run: cargo clippy --all-targets --all-features --manifest-path src-tauri/Cargo.toml -- -D warnings

  rust-test:
    runs-on: windows-latest
    needs: rust-clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          profile: minimal
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  build:
    runs-on: windows-latest
    needs: [test, rust-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: npm run build

  # Cross-platform build compatibility. Whim is Windows-first (nsis is the
  # default local target), but the native host must still compile and bundle
  # on macOS and Linux. The Windows-only `windows` crate is gated behind
  # cfg(windows), so these jobs exercise the non-Windows code paths.
  cross-platform-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundles: app
          - os: ubuntu-latest
            bundles: deb,rpm
    runs-on: ${{ matrix.os }}
    needs: rust-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          profile: minimal
      - run: npm ci
      - run: npm run build
      - name: Install Linux bundling dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./src-tauri
          args: --bundles ${{ matrix.bundles }}

