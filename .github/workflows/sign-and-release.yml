name: Sign and Release (Windows)

# Builds the Windows NSIS installer, code-signs it via SignPath.io (free for
# open source) to avoid Windows SmartScreen/Defender "unknown publisher" warnings,
# then publishes a GitHub release with the signed installer + Tauri update assets.
#
# Setup (one-time, free OSS tier at https://signpath.io/product/open-source):
#   1. Create a SignPath organization and a project (e.g. slug "whim-ide").
#   2. Add a `release-signing` signing policy (origin verification on `main`).
#   3. Add the default artifact configuration for a single EXE.
#   4. Create an API token and add it as a repo SECRET:  SIGNPATH_API_TOKEN
#   5. Add your SignPath ORGANIZATION ID as a repo VARIABLE: SIGNPATH_ORGANIZATION_ID
# Until those are set, this workflow skips signing and releases the unsigned
# installer (SmartScreen will warn).

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]
  push:
    tags:
      - "v*"

concurrency:
  group: sign-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-sign-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          profile: minimal

      - name: Bump version (manual dispatch only)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: pwsh
        run: |
          $bump = "${{ github.event.inputs.bump }}"
          node scripts/bump-version.mjs $bump
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          $v = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          git commit -m "release: v$v"
          git tag "v$v"
          git push origin HEAD --tags

      - name: Install frontend deps and build
        run: npm ci && npm run build

      - name: Build NSIS installer (unsigned)
        run: npx tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ github.workspace }}/src-tauri/whim-release.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      # Tauri update signature (.sig) — independent of Authenticode.
      - name: Generate Tauri update signature
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/Whim IDE_*.exe" | Select-Object -First 1
          npx tauri signer sign -p "" "$($installer.FullName)"

      - name: Normalize installer name
        id: locate
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/Whim IDE_*.exe" | Select-Object -First 1
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $dest = "src-tauri/target/release/bundle/nsis/Whim-IDE_${version}_x64-setup.exe"
          if (-not (Test-Path $dest)) { Move-Item $installer.FullName $dest }
          "installer_path=$dest" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ── Authenticode code-signing via SignPath (gated) ──────────────
      - name: Upload unsigned installer
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: whim-installer-unsigned
          path: ${{ steps.locate.outputs.installer_path }}
          archive: false

      - name: Submit signing request to SignPath
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        id: signpath
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: whim-ide
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 3600
          output-artifact-directory: signed
          skip-decompress: true

      - name: Use signed installer (or fall back to unsigned)
        shell: pwsh
        run: |
          $signed = Get-ChildItem -Path "signed/Whim-IDE_*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($signed) {
            Copy-Item $signed.FullName "${{ steps.locate.outputs.installer_path }}" -Force
            Write-Host "Using SignPath-signed installer: $($signed.Name)"
          } else {
            Write-Host "SignPath not configured — releasing UNSIGNED installer (SmartScreen will warn)."
          }

      - name: Build latest.json
        id: manifest
        shell: pwsh
        run: |
          $version = "${{ steps.locate.outputs.version }}"
          $sig = (Get-Content "${{ steps.locate.outputs.installer_path }}.sig" -Raw).Trim()
          $manifest = @{
            version = $version
            notes = "Whim IDE v$version"
            pub_date = (Get-Date -AsUTC -UFormat "%Y-%m-%dT%H:%M:%SZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig
                url = "https://github.com/${{ github.repository }}/releases/download/v$version/Whim-IDE_${version}_x64-setup.exe"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Out-File -FilePath latest.json -Encoding utf8
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.manifest.outputs.tag }}
          name: Whim IDE ${{ steps.manifest.outputs.tag }}
          files: |
            ${{ steps.locate.outputs.installer_path }}
            ${{ steps.locate.outputs.installer_path }}.sig
            latest.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
