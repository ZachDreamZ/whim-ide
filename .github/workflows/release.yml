name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.4.4)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Verify updater signing key is configured
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set."
            exit 1
          fi
          echo "Signing key present."

      # ── Build (no upload — we handle release artifacts manually) ──
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Do NOT set TAURI_SIGNING_PRIVATE_KEY here — we sign manually below
        with:
          releaseId: ${{ github.event.release.id }}
          # Skip updater JSON generation (broken with spaces in filenames)
          skipPublish: true

      # ── Sign, generate manifest, upload all artifacts ──────
      - name: Sign and publish updater artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Find the NSIS installer
          EXE=$(find src-tauri/target/release/bundle/nsis -name '*-setup.exe' | head -1)
          if [ -z "$EXE" ]; then
            echo "::error::NSIS installer not found"
            exit 1
          fi
          echo "Installer: $EXE"

          # Write signing key to temp file
          KEY_FILE=$(mktemp)
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > "$KEY_FILE"

          # Sign the installer
          npx tauri signer sign \
            -f "$KEY_FILE" \
            -p "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
            "$EXE"

          rm -f "$KEY_FILE"

          SIG_FILE="${EXE}.sig"
          if [ ! -f "$SIG_FILE" ]; then
            echo "::error::Signature file not generated"
            exit 1
          fi
          echo "Signature generated: $SIG_FILE"

          # Read signature content
          SIG_CONTENT=$(cat "$SIG_FILE")

          # Determine download URL
          EXE_NAME=$(basename "$EXE")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${EXE_NAME}"

          # Generate latest.json using python for safe JSON handling
          python3 -c "
          import json, sys, os
          sig = open(sys.argv[1]).read().strip()
          data = {
              'version': sys.argv[2],
              'notes': 'Whim ' + sys.argv[2],
              'pub_date': sys.argv[3],
              'platforms': {
                  'windows-x86_64': {
                      'signature': sig,
                      'url': sys.argv[4]
                  }
              }
          }
          with open('latest.json', 'w') as f:
              json.dump(data, f, indent=2)
          print('Generated latest.json')
          " "$SIG_FILE" "${TAG#v}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$DOWNLOAD_URL"

          # Upload installer, signature, and manifest to the release
          gh release upload "$TAG" \
            "$EXE" \
            "$SIG_FILE" \
            latest.json \
            --clobber

          echo "All artifacts uploaded to release ${TAG}"
          echo "  - $EXE_NAME"
          echo "  - ${EXE_NAME}.sig"
          echo "  - latest.json"
